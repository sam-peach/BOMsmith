services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: bomsmith
      POSTGRES_PASSWORD: bomsmith
      POSTGRES_DB: bomsmith
    ports:
      - "5433:5432"
    volumes:
      - bomsmith_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bomsmith -d bomsmith"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  bomsmith_db:
